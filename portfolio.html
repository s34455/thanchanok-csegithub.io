<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แฟ้มสะสมงานของธัญชนก</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; text-align: center; padding: 30px; }
        .container { max-width: 800px; margin: 0 auto; }
        .project-card { background: white; padding: 20px; margin: 20px 0; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: left; }
        /* ปรับสไตล์รูปภาพตามที่คุณต้องการ: เป็นกรอบสี่เหลี่ยม */
        .profile-img { width: 200px; height: auto; border: 5px solid #2c3e50; border-radius: 0; margin-bottom: 20px; }
        .btn { display: inline-block; background: #2c3e50; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <!-- โค้ดเรียกใช้รูปภาพตามพาธโฟลเดอร์ Thes -->
        <img src="Thes/screenshot.png" alt="รูปของธัญชนก" class="profile-img">
        
        <h1>📁 แฟ้มสะสมงานของธัญชนก</h1>
        <p>นี่คือพื้นที่รวบรวมผลงานและกิจกรรมที่ภูมิใจครับ</p>

        <div class="project-card">
            <h3>1. โครงงาน/ชิ้นงานวิทยาศาสตร์คำนวณ</h3>
            <p>รายละเอียดชิ้นงาน: เขียนอธิบายสั้นๆ ว่าทำอะไร ได้เรียนรู้อะไรจากงานนี้บ้าง</p>
        </div>

        <div class="project-card">
            <h3>2. กิจกรรม/เกียรติบัตรที่ได้รับ</h3>
            <p>รายละเอียดชิ้นงาน: เข้าร่วมการประกวด หรือกิจกรรมของโรงเรียน...</p>
        </div>

        <a href="index.html" class="btn"> กลับหน้าแรก</a>
    </div>

</body>
</html>
